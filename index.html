<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />
    <title>FlowCash 简易记账</title>
    <script>
      /**
       * iOS WKWebView safe-area env() bug workaround.
       *
       * env(safe-area-inset-top) returns 0 on the first paint in portrait
       * mode. The only reliable way to force a recalculation is to mutate
       * the viewport meta tag (initial-scale), which makes WebKit re-read
       * the safe-area insets from the native layer.
       *
       * This script runs synchronously — before any CSS is applied — so the
       * very first paint already has correct values.
       */
      (function () {
        var ua = navigator.userAgent;
        var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
        if (!isIOS) return;

        // 1. Set sensible hard-coded defaults immediately so the first
        //    frame is never completely broken.
        var minDim = Math.min(screen.width, screen.height);
        var maxDim = Math.max(screen.width, screen.height);
        var isNotched = maxDim / minDim > 2.0 && minDim >= 375;

        var defaultTop    = isNotched ? 47 : 20;
        var defaultBottom = isNotched ? 34 : 0;

        var root = document.documentElement;
        root.style.setProperty('--safe-area-top',    defaultTop + 'px');
        root.style.setProperty('--safe-area-bottom', defaultBottom + 'px');
        root.style.setProperty('--safe-area-left',    '0px');
        root.style.setProperty('--safe-area-right',   '0px');

        // 2. Force WKWebView to re-evaluate env() via a viewport mutation.
        var viewport = document.querySelector('meta[name=viewport]');
        if (viewport) {
          var original = viewport.getAttribute('content');
          // Temporarily change initial-scale to force a layout / safe-area re-calc
          viewport.setAttribute('content', original.replace('initial-scale=1.0', 'initial-scale=1.0001'));

          // After the forced recalculation, read the REAL env() values and
          // copy them into our custom CSS variables.
          function readAndSet() {
            // Create a throw-away div to sample env() values
            var probe = document.createElement('div');
            probe.style.cssText = 'position:fixed;top:env(safe-area-inset-top);bottom:env(safe-area-inset-bottom);left:0;width:1px;height:1px;visibility:hidden;pointer-events:none;';
            document.body.appendChild(probe);

            var cs = getComputedStyle(probe);
            var top    = parseFloat(cs.top)    || defaultTop;
            var bottom = parseFloat(cs.bottom) || defaultBottom;
            document.body.removeChild(probe);

            // Overwrite the defaults with the real values (if they're > 0)
            if (top > 0)    root.style.setProperty('--safe-area-top',    top + 'px');
            if (bottom > 0) root.style.setProperty('--safe-area-bottom', bottom + 'px');

            // Restore the original viewport so pinch-zoom behaves normally
            viewport.setAttribute('content', original);
          }

          // We need two rAFs: one for the viewport mutation to take effect,
          // another for getComputedStyle to reflect the new env() values.
          requestAnimationFrame(function () {
            requestAnimationFrame(readAndSet);
          });
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
